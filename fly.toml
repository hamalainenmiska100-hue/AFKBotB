app = "afkbot"
primary_region = "arn"

[build]


[env]
  FLY_VOLUME_PATH = "/data"

[[mounts]]
  source = "data_volume"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
