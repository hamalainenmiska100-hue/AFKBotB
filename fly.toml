app = "afkbot"
primary_region = "ams"
[processes]
api = "node api.js"
bot = "node bot.js"
[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1
processes = ["api"]
[[mounts]]
source = "bot_data"
destination = "/app/data"
processes = ["api", "bot"]
[env]
API_PORT = "3000"
NODE_ENV = "production"
[[vm]]
size = "shared-cpu-3x"
memory_mb = 1024
